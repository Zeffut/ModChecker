name: CI

on:
  push:
    branches: [main]
  pull_request:

# Build-only : le serveur (tests MockBukkit) + la matrice de compilation du mod.
# L'e2e client (runClient) nécessite un écran/GL → il reste local (test/e2e-all.sh).

jobs:
  server:
    name: Server (common + paper + velocity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build & test (mvn verify)
        run: mvn -B -f server/pom.xml clean verify

  mod:
    name: Mod (Fabric + NeoForge, 4 versions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25
          cache: gradle
      - name: Build all mod nodes
        working-directory: mod
        run: |
          set -e
          chmod +x gradlew
          for mc in 1.21.11 26.1 26.1.1 26.1.2; do
            for loader in fabric neoforge; do
              # Fabric Loom exige que Gradle TOURNE sur le Java du MC : 26.x-fabric → JDK 25.
              if [ "$loader" = fabric ] && [ "${mc%%.*}" = 26 ]; then
                JH="$JAVA_HOME_25_X64"
              else
                JH="$JAVA_HOME_21_X64"
              fi
              echo "::group::build $mc-$loader (JAVA_HOME=$JH)"
              JAVA_HOME="$JH" ./gradlew ":$mc-$loader:build" \
                -Dorg.gradle.java.installations.fromEnv=JAVA_HOME_21_X64,JAVA_HOME_25_X64 \
                --no-daemon --stacktrace
              echo "::endgroup::"
            done
          done
